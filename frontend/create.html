<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>War Room – Create Persona</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>War Room</h1>
      <p class="subtitle">Create a new persona</p>
      <nav class="nav-links">
        <a href="/">← Back to Lobby</a>
      </nav>
    </header>

    <div class="builder-container">
      <form id="persona-form" class="persona-form">
        <div class="form-group">
          <label for="p-name">Name</label>
          <input id="p-name" type="text" placeholder="e.g. Marcus Aurelius" required />
        </div>

        <div class="form-group">
          <label for="p-short-desc">Short Description</label>
          <input id="p-short-desc" type="text" placeholder="e.g. He is defined by Stoic discipline and a sense of cosmic duty." required />
        </div>

        <div class="form-group">
          <label for="p-traits">Traits</label>
          <input id="p-traits" type="text" placeholder="e.g. Calm, resilient, selfless, and reflective." required />
        </div>

        <div class="form-group">
          <label for="p-cognitive">Cognitive Style</label>
          <textarea id="p-cognitive" rows="2" placeholder="e.g. Logical and detached..." required></textarea>
        </div>

        <div class="form-group">
          <label for="p-social">Social Behavior</label>
          <textarea id="p-social" rows="2" placeholder="e.g. Reserved and modest..." required></textarea>
        </div>

        <div class="form-group">
          <label for="p-quote">Representative Quote</label>
          <input id="p-quote" type="text" placeholder='e.g. "Waste no more time arguing..."' required />
        </div>

        <div class="form-group">
          <label for="p-interests">Interests</label>
          <input id="p-interests" type="text" placeholder="e.g. Philosophy, virtue, cosmic order" required />
        </div>

        <button type="submit" id="save-btn">Save Persona</button>
        <p id="form-status" class="form-status"></p>
      </form>

      <hr class="divider" />

      <h2 class="section-title">Existing Personas</h2>
      <div id="existing-personas" class="existing-personas"></div>
    </div>
  </div>

  <script src="create.js"></script>
</body>
</html>
