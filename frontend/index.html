<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>War Room</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== SCREEN 1: Persona selection ===== -->
  <div id="lobby" class="app">
    <header>
      <h1>War Room</h1>
      <p class="subtitle">Choose who sits at the table</p>
    </header>

    <div id="persona-grid" class="persona-grid"></div>

    <div class="lobby-footer">
      <button id="create-room-btn" disabled>Create Room</button>
    </div>
  </div>

  <!-- ===== SCREEN 2: Chat room ===== -->
  <div id="room" class="app" style="display:none">
    <header>
      <h1>War Room</h1>
      <p id="room-subtitle" class="subtitle"></p>
    </header>

    <div id="chat" class="chat-container"></div>

    <form id="chat-form" class="input-area">
      <input
        id="user-input"
        type="text"
        placeholder="Say something… (use @Name to summon someone)"
        autocomplete="off"
      />
      <button type="submit" id="send-btn">Send</button>
      <button type="button" id="stop-btn" style="display:none">Stop</button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
